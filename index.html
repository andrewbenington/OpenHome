<!doctype html>
<html lang="en" style="height: 100vh; overflow: hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenHome</title>
    <style>
      @media (prefers-color-scheme: light) {
        body {
          --background-gradient: linear-gradient(
            355deg,
            rgba(83, 180, 165, 1) 0%,
            rgba(125, 206, 171, 1) 85%
          );
          background: var(--background-gradient);
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          --background-gradient: linear-gradient(
            310deg,
            rgba(54, 69, 78, 1) 0%,
            rgba(1, 83, 84, 1) 85%
          );
          background: var(--background-gradient);
        }
      }

      .loading-logo-container {
        height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        position: relative;
      }
    </style>
  </head>

  <body style="height: 100vh; overflow: hidden; margin: 0">
    <!-- DEBUG: catch all errors and show on screen -->
    <script>
      ;(function () {
        var errBox = null
        function showErr(msg) {
          if (!errBox) {
            errBox = document.createElement('div')
            errBox.style.cssText =
              'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:12px;font-family:monospace;font-size:13px;white-space:pre-wrap;max-height:50vh;overflow:auto;'
            document.body.appendChild(errBox)
          }
          errBox.textContent += msg + '\n'
        }
        window.addEventListener('error', function (e) {
          showErr('ERROR: ' + e.message + '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno)
        })
        window.addEventListener('unhandledrejection', function (e) {
          showErr(
            'UNHANDLED REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason)
          )
        })
        window.__debugLog = function (msg) {
          showErr('LOG: ' + msg)
        }
        window.__debugLog('Error trap installed')
      })()
    </script>

    <div id="root">
      <div class="loading-logo-container">
        <img src="logos/logo-full.png" style="width: 128px; height: 128px; position: absolute" />
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
