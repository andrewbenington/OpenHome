name: 'Bug Report'
description: 'Report a bug to help us improve.'
title: '[BUG] enter a short description here'
labels: ['bug']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below so we can address it quickly.

  - type: textarea
    id: description
    attributes:
      label: 'Describe the bug'
      description: 'A clear and concise description of what the bug is.'
      placeholder: 'The app crashes when I try to open the summary page...'
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 'Screenshots'
      description: 'If applicable, add screenshots to help explain your problem.'
      placeholder: 'Drag and drop images here.'

  - type: textarea
    id: save-file
    attributes:
      label: 'Save file'
      description: 'If applicable, upload your Pokémon save file to help us reproduce the bug.'
      placeholder: "Attach your save file here. Please compress and upload as a .zip file, as GitHub won't allow uploading binary files. Avoid using services like limewire, as files uploaded there expire in a week."

  - type: input
    id: platform
    attributes:
      label: 'Platform'
      description: 'What platform are you using?'
      placeholder: 'Windows, Linux, macOS, etc.'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 'Version'
      description: 'Which version of OpenHome are you using?'
      placeholder: 'e.g. 1.5.0'
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 'Additional context'
      description: 'Add any other context about the problem here.'
